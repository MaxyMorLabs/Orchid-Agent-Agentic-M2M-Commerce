version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file: ./backend/.env.example
    environment:
      - NODE_ENV=development

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3001
    depends_on:
      - backend
